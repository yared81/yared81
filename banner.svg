<svg width="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Yared Mehari - Full-Stack Developer &amp; AI Builder</title>
  <desc>Cyberpunk-themed animated banner</desc>
  <defs>
    <style>
      .bg { fill: #0a0a0f; }
      .grid-line { stroke: #1a1a2e; stroke-width: 0.5; }
      .neon-green { fill: #00ff88; }
      .neon-purple { fill: #bf00ff; }
      .neon-cyan { fill: #00e5ff; }
      .title-text {
        font-family: 'Courier New', monospace;
        font-size: 36px;
        font-weight: 700;
        fill: #00ff88;
        filter: url(#glow-green);
      }
      .sub-text {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #bf00ff;
        letter-spacing: 3px;
      }
      .corner { fill: none; stroke-width: 2; }
      .scan-line {
        fill: none;
        stroke: #00ff88;
        stroke-width: 0.4;
        opacity: 0.08;
      }
      .bracket { fill: none; stroke: #00ff88; stroke-width: 1.5; opacity: 0.6; }
      .data-dot { opacity: 0; }
      .pulse-ring { fill: none; stroke: #00ff88; stroke-width: 1; }

      @keyframes flicker {
        0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
        20%,24%,55% { opacity: 0.4; }
      }
      @keyframes scan {
        0% { transform: translateY(0); opacity: 0.15; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes marquee {
        0% { transform: translateX(820px); }
        100% { transform: translateX(-900px); }
      }
      @keyframes blink {
        0%,100% { opacity: 1; } 50% { opacity: 0; }
      }
      @keyframes pulse {
        0% { r: 3; opacity: 1; }
        100% { r: 14; opacity: 0; }
      }
      @keyframes dotAppear {
        0%,60%,100% { opacity: 0.9; }
        30% { opacity: 0.2; }
      }
      @keyframes cornerGlow {
        0%,100% { opacity: 0.5; } 50% { opacity: 1; }
      }
      @keyframes dataScroll {
        0% { opacity: 0; transform: translateY(-8px); }
        20% { opacity: 0.7; }
        80% { opacity: 0.7; }
        100% { opacity: 0; transform: translateY(8px); }
      }
      @keyframes rgbShift {
        0%,100% { fill: #00ff88; }
        33% { fill: #00e5ff; }
        66% { fill: #bf00ff; }
      }

      .title-animate { animation: flicker 4s infinite 1s; }
      .scan-anim { animation: scan 3s linear infinite; }
      .marquee-text { animation: marquee 12s linear infinite; }
      .cursor { animation: blink 1s step-end infinite; }
      .corner-anim { animation: cornerGlow 2s ease-in-out infinite; }
      .rgb-shift { animation: rgbShift 6s ease-in-out infinite; }
    </style>

    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="800" height="200" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#0a0a0f"/>

  <!-- Grid lines horizontal -->
  <g clip-path="url(#banner-clip)">
    <line class="scan-line" x1="0" y1="25" x2="800" y2="25"/>
    <line class="scan-line" x1="0" y1="50" x2="800" y2="50"/>
    <line class="scan-line" x1="0" y1="75" x2="800" y2="75"/>
    <line class="scan-line" x1="0" y1="100" x2="800" y2="100"/>
    <line class="scan-line" x1="0" y1="125" x2="800" y2="125"/>
    <line class="scan-line" x1="0" y1="150" x2="800" y2="150"/>
    <line class="scan-line" x1="0" y1="175" x2="800" y2="175"/>
    <!-- Grid lines vertical -->
    <line class="scan-line" x1="100" y1="0" x2="100" y2="200"/>
    <line class="scan-line" x1="200" y1="0" x2="200" y2="200"/>
    <line class="scan-line" x1="300" y1="0" x2="300" y2="200"/>
    <line class="scan-line" x1="400" y1="0" x2="400" y2="200"/>
    <line class="scan-line" x1="500" y1="0" x2="500" y2="200"/>
    <line class="scan-line" x1="600" y1="0" x2="600" y2="200"/>
    <line class="scan-line" x1="700" y1="0" x2="700" y2="200"/>

    <!-- Animated scanline sweep -->
    <rect x="0" y="0" width="800" height="2" fill="#00ff88" opacity="0.06" class="scan-anim"/>
  </g>

  <!-- Corner brackets TL -->
  <polyline class="bracket corner-anim" points="12,40 12,12 40,12" style="animation-delay:0s"/>
  <polyline class="bracket corner-anim" points="760,12 788,12 788,40" style="animation-delay:0.5s"/>
  <polyline class="bracket corner-anim" points="12,160 12,188 40,188" style="animation-delay:1s"/>
  <polyline class="bracket corner-anim" points="760,188 788,188 788,160" style="animation-delay:1.5s"/>

  <!-- Side accent lines -->
  <line x1="0" y1="0" x2="0" y2="200" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
  <line x1="800" y1="0" x2="800" y2="200" stroke="#bf00ff" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="0" x2="800" y2="0" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>
  <line x1="0" y1="199" x2="800" y2="199" stroke="#bf00ff" stroke-width="1.5" opacity="0.5"/>

  <!-- Pulse circles left deco -->
  <circle cx="58" cy="100" r="3" fill="#00ff88" opacity="0.9"/>
  <circle cx="58" cy="100" r="3" fill="none" stroke="#00ff88" stroke-width="1">
    <animate attributeName="r" from="3" to="18" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse circles right deco -->
  <circle cx="742" cy="100" r="3" fill="#bf00ff" opacity="0.9"/>
  <circle cx="742" cy="100" r="3" fill="none" stroke="#bf00ff" stroke-width="1">
    <animate attributeName="r" from="3" to="18" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.8" to="0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Data dots column left -->
  <circle cx="30" cy="60" r="2" fill="#00ff88"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.3s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="80" r="2" fill="#00e5ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="100" r="2" fill="#bf00ff"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.7s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="120" r="2" fill="#00ff88"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="0.9s" repeatCount="indefinite"/></circle>
  <circle cx="30" cy="140" r="2" fill="#00e5ff"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.5s" repeatCount="indefinite"/></circle>

  <!-- Data dots column right -->
  <circle cx="770" cy="60" r="2" fill="#bf00ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="80" r="2" fill="#00ff88"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.2s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="100" r="2" fill="#00e5ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="120" r="2" fill="#00ff88"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.0s" repeatCount="indefinite"/></circle>
  <circle cx="770" cy="140" r="2" fill="#bf00ff"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="1.6s" repeatCount="indefinite"/></circle>

  <!-- Top label -->
  <text x="400" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" letter-spacing="6" opacity="0.7">[ INITIALIZING SYSTEM ]</text>

  <!-- Main name -->
  <text x="400" y="98" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="42" font-weight="700"
    fill="#00ff88"
    class="title-animate"
    filter="url(#glow-green)">YARED MEHARI</text>

  <!-- Subtitle bar -->
  <rect x="120" y="108" width="560" height="1" fill="#bf00ff" opacity="0.4"/>
  <text x="400" y="128" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="12" fill="#bf00ff"
    letter-spacing="4"
    filter="url(#glow-purple)">FULL-STACK DEVELOPER  ·  AI BUILDER  ·  BACKEND ENGINEER</text>

  <!-- Marquee strip -->
  <rect x="0" y="148" width="800" height="24" fill="#0d0d1a"/>
  <line x1="0" y1="148" x2="800" y2="148" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
  <line x1="0" y1="172" x2="800" y2="172" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>

  <clipPath id="marquee-clip">
    <rect x="0" y="148" width="800" height="24"/>
  </clipPath>
  <g clip-path="url(#marquee-clip)">
    <text class="marquee-text" y="164"
      font-family="'Courier New', monospace"
      font-size="11" fill="#00e5ff" letter-spacing="2">
      ◈  React  ◈  Node.js  ◈  FastAPI  ◈  PostgreSQL  ◈  Supabase  ◈  Python  ◈  TypeScript  ◈  Flutter  ◈  Docker  ◈  AI/ML  ◈  REST APIs  ◈  Real-time Systems  ◈  Open Source
    </text>
  </g>

  <!-- Bottom status bar -->
  <text x="55" y="192" font-family="'Courier New', monospace" font-size="9" fill="#00ff88" opacity="0.6">STATUS: ONLINE</text>
  <circle cx="120" cy="189" r="3" fill="#00ff88"><animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/></circle>
  <text x="400" y="192" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#bf00ff" opacity="0.5">◄ BUILDING THE FUTURE, ONE COMMIT AT A TIME ►</text>
  <text x="745" y="192" font-family="'Courier New', monospace" font-size="9" fill="#00ff88" opacity="0.6">v2.0.26</text>
</svg>
